<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>中央大學生態與保育資訊網</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#2e5b2e;
    color:white;
}

/* Header */
.header{
    background:#1f3f2b;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* Navbar */
.nav{
    display:flex;
}

.nav a{
    flex:1;
    text-align:center;
    padding:15px;
    background:#6e9f6e;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    display:flex;
    padding:20px;
    gap:20px;
}

.left{
    flex:2;
    position:relative;
}

.left img{
    width:100%;
    border-radius:10px;
    opacity:0.8;
}

.text-overlay{
    position:absolute;
    bottom:30px;
    left:30px;
    font-size:26px;
}

.right{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.map-box{
    background:#5c7f5c;
    padding:20px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
}

.box{
    padding:20px;
    border-radius:20px;
}

.animal{ background:#3c7a7a; }
.plant{ background:#7a6a3c; }

/* Modal */
.modal{
    display:none;
    position:fixed;
    z-index:999;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:40px;
    cursor:pointer;
}

/* 地圖 */
.map-container{
    position:relative;
    width:80%;
    margin:60px auto;
}

.map-container img{
    width:100%;
}

/* 點 */
.point{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
    z-index:1000;
}

.point:hover{
    background:rgba(255,255,255,0.3);
}

/* 側邊資訊 */
.panel{
    position:fixed;
    right:-400px;
    top:0;
    width:400px;
    height:100%;
    background:#1f3f2b;
    padding:20px;
    transition:0.4s;
}

.panel.show{
    right:0;
}

.panel img{
    width:100%;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h2>中央大學生態與保育資訊網</h2>
</div>

<!-- Navbar -->
<div class="nav">
    <a href="#">首頁</a>
    <a href="#" onclick="openMap()">中大生態地圖</a>
</div>

<!-- Main -->
<div class="container">

    <div class="left">
        <img src="ncu.jpg">
        <div class="text-overlay">
            你了解校園生態嗎？
        </div>
    </div>

    <div class="right">
        <div class="map-box" onclick="openMap()">
            <h3>生態地圖</h3>
            <img src="map.png">
        </div>
    </div>

</div>

<!-- Modal -->
<div id="mapModal" class="modal">
    <span class="close" onclick="closeMap()">✖</span>

    <div class="map-container">
        <img src="navigation_map.png">

        <!-- 點 -->
        <div class="point" style="top:30%; left:70%;" onclick="showInfo('squirrel')"></div>
        <div class="point" style="top:60%; left:60%;" onclick="showInfo('bird')"></div>
        <div class="point" style="top:50%; left:20%;" onclick="showInfo('cherry')"></div>
    </div>
</div>

<!-- 側邊 -->
<div id="panel" class="panel">
    <h2 id="title"></h2>
    <img id="img">
    <p id="text"></p>
</div>

<script>
function openMap(){
    document.getElementById("mapModal").style.display = "block";
}

function closeMap(){
    document.getElementById("mapModal").style.display = "none";
}

function showInfo(type){

    let data = {
        squirrel:{
            name:"赤腹松鼠",
            img:"animal1.jpg",
            text:"常見於校園樹林，活動靈活"
        },
        bird:{
            name:"台灣藍鵲",
            img:"animal2.jpg",
            text:"台灣特有種，色彩鮮豔"
        },
        cherry:{
            name:"櫻花",
            img:"plant5.jpg",
            text:"春季盛開的校園植物"
        }
    };

    let p = data[type];

    document.getElementById("title").innerText = p.name;
    document.getElementById("img").src = p.img;
    document.getElementById("text").innerText = p.text;

    document.getElementById("panel").classList.add("show");
}
</script>

</body>
</html>
