<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中央大學生態與保育資訊網</title>
    <style>
        body {
            margin: 0;
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background-color: #2e5b2e;
            color: white;
            overflow-x: hidden;
        }

        /* --- Header & Nav --- */
        .header {
            background: #1f3f2b;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { font-size: 28px; font-weight: bold; }
        .header-sub { font-size: 14px; opacity: 0.8; }
        
        .nav { display: flex; }
        .nav a {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #6e9f6e;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .nav a:hover { background: #4e7f4e; }

        /* --- Main Layout --- */
        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }
        .left { flex: 2; position: relative; }
        .left img { width: 100%; border-radius: 10px; opacity: 0.9; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .text-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .right { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        /* --- Right Side Boxes --- */
        .map-box {
            background: #5c7f5c;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .map-box:hover { background: #6e9f6e; transform: translateY(-5px); }
        .map-box img { width: 80%; border-radius: 5px; margin-top: 10px; }

        .box { padding: 20px; border-radius: 20px; transition: 0.3s; }
        .box:hover { transform: scale(1.02); }
        .animal { background: #3c7a7a; }
        .plant { background: #7a6a3c; }
        .box h3 { margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }

        /* --- Modal (The Map) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }
        .map-wrapper {
            position: relative;
            margin: 50px auto;
            width: 90%;
            max-width: 900px;
        }
        .map-wrapper img.main-map { width: 100%; border-radius: 10px; border: 3px solid #6e9f6e; }

        .close {
            position: absolute;
            top: -40px; right: 0;
            color: white; font-size: 40px; font-weight: bold; cursor: pointer;
        }

        /* --- Interactive Spots --- */
        .spot {
            position: absolute;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: 0.3s;
            animation: breathe 2s infinite ease-in-out;
        }
        .spot img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .spot:hover { transform: scale(1.3); z-index: 10; animation-play-state: paused; }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 5px rgba(255,255,255,0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
        }

        /* --- Info Box (The Description) --- */
        .info-box {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1001;
            width: 300px;
            text-align: center;
        }
        .info-box h2 { margin: 0 0 10px 0; color: #2e5b2e; }
        .info-box p { line-height: 1.6; margin-bottom: 20px; }
        .info-box button {
            background: #2e5b2e; color: white; border: none;
            padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>

<body>

<div class="header">
    <div>
        <div class="header-title">中央大學 生態與保育資訊網</div>
        <div class="header-sub">National Central University Ecological and Conservation Information Website</div>
    </div>
    <img src="logo.png" width="100" alt="NCU Logo">
</div>

<div class="nav">
    <a href="#">首頁<br>Home</a>
    <a href="javascript:void(0)" onclick="openMap()">中大生態地圖<br>NCU Ecology Map</a>
    <a href="#">資源中心<br>Resources</a>
    <a href="#">參與我們<br>Join Us</a>
</div>

<div class="container">
    <div class="left">
        <img src="ncu.jpg" alt="NCU Campus">
        <div class="text-overlay">
            生活在中央大學，<br>
            但我們究竟對周遭的環境及其保育了解多少呢？
        </div>
    </div>

    <div class="right">
        <div class="map-box" onclick="openMap()">
            <h3>生態地圖 (點擊開啟)</h3>
            <p>探索校園動植物分布</p>
            <img src="map.png" alt="Map Preview">
        </div>

        <div class="box animal">
            <h3>常見動物</h3>
            <p>台灣藍鵲、赤腹松鼠、攀蜥、澤蛙、霜白蜻蜓</p>
        </div>

        <div class="box plant">
            <h3>常見植物</h3>
            <p>台灣肖楠、龍柏、白千層、相思樹、櫻花</p>
        </div>
    </div>
</div>

<div id="mapModal" class="modal">
    <div class="map-wrapper">
        <span class="close" onclick="closeMap()">&times;</span>
        <img class="main-map" src="navigation_map.png" alt="NCU Navigation Map">

        <div class="spot" style="top: 30%; left: 25%;" onclick="showInfo('赤腹松鼠', '中大最具代表性的動物！牠們喜歡在松林中跳躍，也會出現在大草坪附近尋找食物。')">
            <img src="squirrel_avatar.png" alt="松鼠">
        </div>

        <div class="spot" style="top: 55%; left: 60%;" onclick="showInfo('台灣藍鵲', '台灣特有種，鮮豔的藍色羽毛與長尾巴是特徵，常在百花川與小木屋附近集體活動。')">
            <img src="magpie_avatar.png" alt="藍鵲">
        </div>
        
        <div class="spot" style="top: 45%; left: 45%;" onclick="showInfo('櫻花', '每年初春在中大湖與環校道路旁綻放，吸引許多遊客前來賞花。')">
            <img src="cherry_avatar.png" alt="櫻花">
        </div>
    </div>
</div>

<div id="infoBox" class="info-box">
    <h2 id="infoTitle">名稱</h2>
    <p id="infoText">詳細介紹...</p>
    <button onclick="closeInfo()">了解囉！</button>
</div>

<script>
    const mapModal = document.getElementById("mapModal");
    const infoBox = document.getElementById("infoBox");

    function openMap() {
        mapModal.style.display = "block";
    }

    function closeMap() {
        mapModal.style.display = "none";
        closeInfo();
    }

    function showInfo(name, text) {
        document.getElementById("infoTitle").innerText = name;
        document.getElementById("infoText").innerText = text;
        infoBox.style.display = "block";
    }

    function closeInfo() {
        infoBox.style.display = "none";
    }

    // 點擊 Modal 黑色背景區域時也能關閉地圖
    window.onclick = function(event) {
        if (event.target == mapModal) {
            closeMap();
        }
    }
</script>

</body>
</html>
